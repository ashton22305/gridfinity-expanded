name: Continuous Integration

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Classify changed paths
        id: changes
        run: node scripts/classify-changes.mjs "${{ github.event.pull_request.base.sha || github.event.before }}" "${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Validate printability
        if: steps.changes.outputs.manifold == 'true'
        run: npm run check:manifold

      - name: Install Chromium
        if: steps.changes.outputs.playwright == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run browser smoke tests
        if: steps.changes.outputs.playwright == 'true'
        run: npm run test:e2e
